<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <form action="/." method="">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome">

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha">

        <div class="checkbox">
        <input type="checkbox" id="termos" name="termos" value="aceito"> 
        <label for="termos">Aceito os termos de uso</label>
        </div>

        <div class="checkbox">
        <input type="checkbox" id="anuncios" name="anuncios" value="aceito"> 
        <label for="anuncios">Desejo receber anúncios.</label>
        </div>

        <p>Entrega:</p>
        <div class="radio">
        <input type="radio" id="retirada" name="retirada" > 
        <label for="retirada">Retirar no local.</label>
        </div>
        <div class="radio">
        <input type="radio" id="entrega" name="retirada" > 
        <label for="entrega">Entrega em casa.</label>
        </div>

        <button>Enviar</button>

        <label for="parcelas"></label>
        <select name="parcelas" id="parcelas">
            <option value="1x">1x de $500</option>
            <option value="2x">2x de $250</option>
            <option value="4x">4x de $50</option>
        </select>

        <label for="mensagem">Mensagem:</label>
        <textarea name="mensagem" id="mensagem"  rows="4"></textarea>
        
    </form> 
</body>
</html>
